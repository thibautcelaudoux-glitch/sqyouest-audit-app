<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQYouest — Audit Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#0d1117;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
input,textarea,select,button{font-family:inherit}
:root{
--bg:#0d1117;--surface:#161b27;--surface2:#1e2433;--border:#2a3044;
--accent:#f97316;--accent2:#fb923c;--ok:#22c55e;--nok:#ef4444;--na:#64748b;
--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--radius:10px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
body{background-color:var(--bg);color:var(--text)}
.topbar{\background:var(--surface);\border-bottom:1px solid var(--border);\padding:12px 20px;\display:flex;\align-items:center;\justify-content:space-between}
